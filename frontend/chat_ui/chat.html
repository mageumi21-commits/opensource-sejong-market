<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채팅</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #eef1f4;
      color: #20242a;
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    .chat-page {
      width: min(760px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: 62px 1fr 74px;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-bottom: 1px solid #e6eaee;
      background: #fff;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      color: #5d6673;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
    }

    .room-title {
      min-width: 0;
    }

    .room-title strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
      font-weight: 900;
    }

    .room-title span {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: #7b8592;
      font-size: 12px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .messages {
      overflow-y: auto;
      padding: 18px;
      background: #f6f8fa;
    }

    .message-row {
      display: flex;
      margin-bottom: 12px;
    }

    .message-row.mine {
      justify-content: flex-end;
    }

    .message {
      max-width: min(460px, 78%);
    }

    .sender {
      margin: 0 0 4px 2px;
      color: #7d8794;
      font-size: 12px;
      font-weight: 800;
    }

    .bubble {
      padding: 11px 13px;
      border-radius: 8px;
      background: #fff;
      color: #252b32;
      line-height: 1.45;
      white-space: pre-wrap;
      box-shadow: 0 1px 2px rgba(26, 33, 42, 0.06);
    }

    .mine .bubble {
      background: #ff5057;
      color: #fff;
    }

    .time {
      margin-top: 5px;
      color: #9ba4ae;
      font-size: 11px;
      font-weight: 700;
    }

    .mine .time {
      text-align: right;
    }

    .input-area {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid #e6eaee;
      background: #fff;
    }

    .message-input {
      flex: 1;
      height: 48px;
      min-width: 0;
      border: 1px solid #dce2e8;
      border-radius: 8px;
      padding: 0 14px;
      color: #252b32;
      font-size: 15px;
      outline: none;
    }

    .message-input:focus {
      border-color: #ff5057;
    }

    .send-btn {
      width: 78px;
      height: 48px;
      border: 0;
      border-radius: 8px;
      background: #ff5057;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .send-btn:disabled {
      background: #c8cdd3;
      cursor: not-allowed;
    }

    .status {
      padding: 24px;
      color: #727d8a;
      font-weight: 800;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="chat-page">
    <header class="header">
      <button class="back-btn" type="button" id="backBtn" aria-label="뒤로가기">&lt;</button>
      <div class="room-title">
        <strong id="roomTitle">채팅</strong>
        <span id="roomSubTitle">대화 정보를 불러오는 중입니다.</span>
      </div>
    </header>

    <main class="messages" id="messages">
      <div class="status">메시지를 불러오는 중입니다.</div>
    </main>

    <form class="input-area" id="messageForm">
      <input class="message-input" id="messageInput" type="text" maxlength="1000" placeholder="메시지를 입력하세요" autocomplete="off" />
      <button class="send-btn" id="sendBtn" type="submit">전송</button>
    </form>
  </div>

  <script>
    const API_BASE_URL = "http://localhost:8080";
    const params = new URLSearchParams(location.search);
    const roomId = params.get("roomId");
    const messagesEl = document.getElementById("messages");
    const roomTitleEl = document.getElementById("roomTitle");
    const roomSubTitleEl = document.getElementById("roomSubTitle");
    const messageForm = document.getElementById("messageForm");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    let pollingId = null;
    let latestRenderedIds = "";

    document.getElementById("backBtn").addEventListener("click", () => {
      history.back();
    });

    function getLoginEmail() {
      try {
        const loginUser = JSON.parse(localStorage.getItem("loginUser"));
        if (loginUser && loginUser.email) {
          return loginUser.email;
        }
      } catch (error) {
        return localStorage.getItem("loginEmail") || "";
      }

      return localStorage.getItem("loginEmail") || localStorage.getItem("userEmail") || "";
    }

    function formatTime(value) {
      if (!value) {
        return "";
      }

      return new Date(value).toLocaleString("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderMessages(messages) {
      const ids = messages.map((message) => message.id).join(",");
      if (ids === latestRenderedIds) {
        return;
      }

      latestRenderedIds = ids;
      const loginEmail = getLoginEmail();

      if (messages.length === 0) {
        messagesEl.innerHTML = `<div class="status">아직 메시지가 없습니다.</div>`;
        return;
      }

      messagesEl.innerHTML = messages.map((message) => {
        const mine = message.senderEmail === loginEmail;
        const sender = escapeHtml(message.senderNickname || message.senderEmail);
        const content = escapeHtml(message.content);
        return `
          <div class="message-row ${mine ? "mine" : ""}">
            <div class="message">
              ${mine ? "" : `<div class="sender">${sender}</div>`}
              <div class="bubble">${content}</div>
              <div class="time">${formatTime(message.createdAt)}</div>
            </div>
          </div>
        `;
      }).join("");

      scrollToBottom();
    }

    async function loadRoom() {
      if (!roomId) {
        roomSubTitleEl.textContent = "채팅방 id가 없습니다.";
        messagesEl.innerHTML = `<div class="status">채팅방 id가 없습니다.</div>`;
        sendBtn.disabled = true;
        return;
      }

      const response = await fetch(`${API_BASE_URL}/api/chatrooms/${roomId}`);
      if (!response.ok) {
        throw new Error(await response.text());
      }

      const room = await response.json();
      const loginEmail = getLoginEmail();
      const opponentName = loginEmail === room.sellerEmail
        ? room.buyerNickname || room.buyerEmail
        : room.sellerNickname || room.sellerEmail;

      roomTitleEl.textContent = opponentName;
      roomSubTitleEl.textContent = room.productName;
    }

    async function loadMessages() {
      const response = await fetch(`${API_BASE_URL}/api/chatrooms/${roomId}/messages`);
      if (!response.ok) {
        throw new Error(await response.text());
      }

      renderMessages(await response.json());
    }

    async function init() {
      try {
        if (!getLoginEmail()) {
          sendBtn.disabled = true;
          messagesEl.innerHTML = `<div class="status">로그인 후 채팅을 이용할 수 있습니다.</div>`;
          return;
        }

        await loadRoom();
        await loadMessages();
        pollingId = setInterval(loadMessages, 2500);
      } catch (error) {
        messagesEl.innerHTML = `<div class="status">${error.message || "채팅을 불러오지 못했습니다."}</div>`;
        sendBtn.disabled = true;
      }
    }

    messageForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const content = messageInput.value.trim();
      if (!content) {
        return;
      }

      try {
        sendBtn.disabled = true;
        const response = await fetch(`${API_BASE_URL}/api/chatrooms/${roomId}/messages`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            senderEmail: getLoginEmail(),
            content
          })
        });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        messageInput.value = "";
        latestRenderedIds = "";
        await loadMessages();
      } catch (error) {
        alert(error.message || "메시지를 보내지 못했습니다.");
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    });

    window.addEventListener("beforeunload", () => {
      if (pollingId) {
        clearInterval(pollingId);
      }
    });

    init();
  </script>
</body>
</html>
