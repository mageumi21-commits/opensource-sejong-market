<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 — 세종대학교 중고거래</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="mypage.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 네비게이션 -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-logo">
        <img src="logo.png" alt="세종대학교 로고" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">세종대학교 중고거래</span>
      </div>
      <ul class="nav-links">
        <li><a href="#">홈</a></li>
        <li><a href="#">중고거래</a></li>
        <li><a href="#">상품등록</a></li>
        <li><a href="#" class="nav-active">마이페이지</a></li>
      </ul>
    </div>
  </nav>

  <main class="mypage-layout">

    <!-- 왼쪽: 사용자 정보 -->
    <aside class="profile-panel">

      <div class="profile-avatar">
        <i class="ti ti-user"></i>
      </div>

      <p class="profile-nickname" id="profileNickname">홍길동</p>
      <p class="profile-dept" id="profileDept">소프트웨어융합대학 · 컴퓨터공학과</p>

      <div class="profile-info-list">
        <div class="profile-info-row">
          <i class="ti ti-mail"></i>
          <span id="profileEmail">hong1234@sju.ac.kr</span>
        </div>
        <div class="profile-info-row">
          <i class="ti ti-id-badge"></i>
          <span id="profileStudentId">23011234</span>
        </div>
      </div>

      <div class="profile-stats">
        <div class="stat-item">
          <span class="stat-num" id="statProducts">0</span>
          <span class="stat-label">등록 상품</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="statWishlist">0</span>
          <span class="stat-label">찜한 상품</span>
        </div>
      </div>

      <button class="edit-btn" onclick="alert('정보 수정 기능은 준비 중이에요.')">
        <i class="ti ti-pencil"></i> 정보 수정
      </button>

    </aside>

    <!-- 오른쪽: 상품 목록 -->
    <section class="products-panel">

      <div class="panel-header">
        <h2 class="panel-title">내가 등록한 상품</h2>
        <a href="#" class="register-btn">
          <i class="ti ti-plus"></i> 상품 등록
        </a>
      </div>

      <!-- 상품 목록 (백엔드 연동 전 샘플 데이터) -->
      <div class="product-list" id="productList">
        <!-- 샘플 상품 1 -->
        <div class="product-card">
          <div class="product-img-wrap">
            <div class="product-img-placeholder">
              <i class="ti ti-photo"></i>
            </div>
            <span class="product-status on-sale">판매중</span>
          </div>
          <div class="product-info">
            <p class="product-title">전공책 자료구조 팝니다</p>
            <p class="product-price">15,000원</p>
            <p class="product-desc">한 학기 사용했고 상태 양호합니다. 직거래 선호해요.</p>
            <div class="product-meta">
              <span><i class="ti ti-map-pin"></i> 광개토관</span>
              <span><i class="ti ti-clock"></i> 1시간 전</span>
            </div>
          </div>
          <div class="product-actions">
            <button class="action-icon-btn" title="수정"><i class="ti ti-pencil"></i></button>
            <button class="action-icon-btn danger" title="삭제"><i class="ti ti-trash"></i></button>
          </div>
        </div>

        <!-- 샘플 상품 2 -->
        <div class="product-card">
          <div class="product-img-wrap">
            <div class="product-img-placeholder">
              <i class="ti ti-photo"></i>
            </div>
            <span class="product-status sold-out">판매완료</span>
          </div>
          <div class="product-info">
            <p class="product-title">아이패드 거치대 팝니다</p>
            <p class="product-price">8,000원</p>
            <p class="product-desc">사용감 거의 없어요. 자취방 정리하면서 내놓습니다.</p>
            <div class="product-meta">
              <span><i class="ti ti-map-pin"></i> 학생회관</span>
              <span><i class="ti ti-clock"></i> 2일 전</span>
            </div>
          </div>
          <div class="product-actions">
            <button class="action-icon-btn" title="수정"><i class="ti ti-pencil"></i></button>
            <button class="action-icon-btn danger" title="삭제"><i class="ti ti-trash"></i></button>
          </div>
        </div>

      </div>

      <!-- 등록한 상품이 없을 때 (기본 숨김) -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="ti ti-box-off"></i>
        <p>아직 등록한 상품이 없어요.</p>
        <a href="#" class="empty-register-btn">
          <i class="ti ti-plus"></i> 첫 상품 등록하기
        </a>
      </div>

    </section>

  </main>

  <script src="mypage.js"></script>
</body>
</html>
