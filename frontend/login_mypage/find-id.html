<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이디 찾기 — 세종대학교 중고거래</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="find.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-logo">
        <img src="logo.png" alt="세종대학교 로고" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">세종대학교 중고거래</span>
      </div>
      <ul class="nav-links">
        <li><a href="#">홈</a></li>
        <li><a href="#">중고거래</a></li>
        <li><a href="#">상품등록</a></li>
        <li><a href="#">마이페이지</a></li>
      </ul>
    </div>
  </nav>

  <main class="page">
    <div class="card">

      <!-- 헤더 -->
      <div class="find-header">
        <a href="login.html" class="back-link">
          <i class="ti ti-arrow-left"></i> 로그인으로 돌아가기
        </a>
        <h1 class="find-title">아이디 찾기</h1>
        <p class="find-sub">가입 시 등록한 이름과 학번으로 아이디를 찾을 수 있어요.</p>
      </div>

      <!-- 탭 -->
      <div class="tab-bar">
        <button class="tab active" data-tab="student">학번으로 찾기</button>
        <button class="tab" data-tab="email">이메일로 찾기</button>
      </div>

      <!-- 학번으로 찾기 -->
      <div class="tab-content active" id="tab-student">
        <div class="field">
          <label for="findName1">이름 <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ti ti-user"></i>
            <input type="text" id="findName1" placeholder="실명 입력">
          </div>
        </div>

        <div class="field">
          <label for="findStudentId">학번 <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ti ti-id-badge"></i>
            <input type="text" id="findStudentId" placeholder="예: 23011234" maxlength="8">
          </div>
        </div>

        <button class="primary-btn" onclick="findIdByStudent()">
          <i class="ti ti-search"></i> 아이디 찾기
        </button>
      </div>

      <!-- 이메일로 찾기 -->
      <div class="tab-content" id="tab-email">
        <div class="field">
          <label for="findName2">이름 <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ti ti-user"></i>
            <input type="text" id="findName2" placeholder="실명 입력">
          </div>
        </div>

        <div class="field">
          <label for="findEmail">학교 이메일 <span class="required">*</span></label>
          <div class="email-row">
            <div class="input-wrap">
              <i class="ti ti-mail"></i>
              <input type="text" id="findEmail" placeholder="학번 또는 아이디">
            </div>
            <div class="domain-tag">@sju.ac.kr</div>
          </div>
        </div>

        <button class="primary-btn" onclick="findIdByEmail()">
          <i class="ti ti-search"></i> 아이디 찾기
        </button>
      </div>

      <!-- 결과 영역 (처음엔 숨김) -->
      <div class="result-box" id="resultBox" style="display:none;">
        <div class="result-icon success">
          <i class="ti ti-circle-check"></i>
        </div>
        <p class="result-label">회원님의 아이디는</p>
        <p class="result-value" id="resultId"></p>
        <p class="result-date" id="resultDate"></p>
        <div class="result-actions">
          <a href="login.html" class="result-btn primary">로그인하기</a>
          <a href="find-pw.html" class="result-btn secondary">비밀번호 찾기</a>
        </div>
      </div>

      <!-- 찾기 실패 (처음엔 숨김) -->
      <div class="result-box" id="failBox" style="display:none;">
        <div class="result-icon fail">
          <i class="ti ti-circle-x"></i>
        </div>
        <p class="result-label">일치하는 아이디를 찾을 수 없어요.</p>
        <p class="result-sub">입력하신 정보를 다시 확인해 주세요.</p>
        <div class="result-actions">
          <a href="signup.html" class="result-btn primary">회원가입하기</a>
        </div>
      </div>

    </div>
  </main>

  <script src="find.js"></script>
</body>
</html>
