<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 세종대학교 중고거래</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 상단 네비게이션 -->
  <nav class="navbar">
   <div class="nav-inner">
      <div class="nav-logo">
        <img src="logo.png" alt="세종대학교 로고" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">세종대학교 중고거래</span>
      </div>
      <ul class="nav-links">
        <li><a href="#">홈</a></li>
        <li><a href="#">중고거래</a></li>
        <li><a href="#">상품등록</a></li>
        <li><a href="#">마이페이지</a></li>
      </ul>
    </div>
  </nav>

  <!-- 메인 콘텐츠 -->
  <main class="page">
    <div class="card">

      <!-- 로고 -->
      <div class="logo-area">
        <img src="logo.png" alt="세종대학교 로고" class="seal-logo">
        <h1 class="brand-title">세종대학교 중고거래</h1>
        <p class="brand-sub">Sejong University Market</p>
      </div>

      <!-- 탭 -->
      <div class="tab-bar">
        <button class="tab active" data-tab="id">ID 로그인</button>
        <button class="tab" data-tab="student">학번 로그인</button>
      </div>

      <!-- ID 로그인 탭 -->
      <div class="tab-content active" id="tab-id">
        <div class="input-group">
          <div class="input-row">
            <i class="ti ti-user"></i>
            <input type="text" id="loginId" placeholder="아이디 또는 이메일">
          </div>
          <div class="divider-line"></div>
          <div class="input-row">
            <i class="ti ti-lock"></i>
            <input type="password" id="loginPw" placeholder="비밀번호">
          </div>
        </div>

        <div class="options-row">
          <label class="keep-login">
            <input type="checkbox" id="keepLogin">
            <span>로그인 상태 유지</span>
          </label>
        </div>

        <button class="login-btn" onclick="handleLogin()">로그인</button>

        <div class="bottom-links">
          <a href="find-pw.html">비밀번호 찾기</a>
          <span class="sep">|</span>
          <a href="find-id.html">아이디 찾기</a>
          <span class="sep">|</span>
          <a href="signup.html">회원가입</a>
        </div>
      </div>

      <!-- 학번 로그인 탭 -->
      <div class="tab-content" id="tab-student">
        <div class="input-group">
          <div class="input-row">
            <i class="ti ti-id-badge"></i>
            <input type="text" placeholder="학번 (8자리)" maxlength="8">
          </div>
          <div class="divider-line"></div>
          <div class="input-row">
            <i class="ti ti-lock"></i>
            <input type="password" placeholder="비밀번호">
          </div>
        </div>

        <div class="options-row">
          <label class="keep-login">
            <input type="checkbox">
            <span>로그인 상태 유지</span>
          </label>
        </div>

        <button class="login-btn">로그인</button>

       <div class="bottom-links">
          <a href="find-pw.html">비밀번호 찾기</a>
          <span class="sep">|</span>
          <a href="find-id.html">아이디 찾기</a>
          <span class="sep">|</span>
          <a href="signup.html">회원가입</a>
        </div>
      </div>

  </main>

  <script src="login.js"></script>
</body>
</html>
